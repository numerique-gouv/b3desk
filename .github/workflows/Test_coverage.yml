name: Check coverage

on:
  pull_request:
    branches:
      - production
      - main
  push:
    branches:
      - production
      - main

jobs:
  compare-coverage:
    name: Compare with previous coverage
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: 1
    steps:
      - name: Setup git
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.13

      - name: Install PostgreSQL binaries
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql
          sudo systemctl stop postgresql

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests with coverage (sqlite + postgresql)
        run: uv run pytest --cov --cov-report=xml --cov-report=term:skip-covered --db=sqlite --db=postgresql

      - name: Generate HTML coverage report
        run: uv run coverage html

      - name: Check diff coverage for modified files
        if: github.event_name == 'pull_request'
        run: |
          uv run diff-cover coverage.xml --compare-branch=origin/${{ github.base_ref }} --fail-under=100 --format github-annotations:warning
