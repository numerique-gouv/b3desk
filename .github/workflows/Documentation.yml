---
name: Documentation
on:
  push:
    branches:
      - production
      - main
  pull_request:
    branches:
      - production
      - main
jobs:
  tests:
    name: ${{ matrix.python }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build documentation
        run: uv run --group doc sphinx-build documentation build/sphinx/html
